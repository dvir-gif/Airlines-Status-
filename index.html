<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>סטטוס חברות תעופה - אמסלם</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00bcd4;
            --primary-hover: #00acc1;
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            
            --status-active-bg: #dcfce7;
            --status-active-text: #166534;
            
            --status-soon-bg: #fef9c3;
            --status-soon-text: #854d0e;
            
            --status-suspended-bg: #fee2e2;
            --status-suspended-text: #991b1b;

            --status-inactive-bg: #f1f5f9;
            --status-inactive-text: #475569;
        }

        body {
            font-family: 'Heebo', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
        }

        .top-bar {
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .brand-logo img {
            height: 70px;
            object-fit: contain;
        }
        
        .brand-fallback {
            display: none;
            font-size: 1.8rem;
            font-weight: 800;
            color: #333;
            letter-spacing: -0.5px;
        }
        .brand-fallback span {
            color: var(--primary);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .lang-toggle {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 12px rgba(0, 188, 212, 0.2);
            position: relative;
            overflow: hidden;
        }

        .lang-toggle::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: all 0.5s ease;
        }

        .lang-toggle:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 188, 212, 0.3);
        }

        .lang-toggle:hover::before {
            left: 100%;
        }

        .lang-toggle i {
            font-size: 1.1rem;
        }

        .header-content {
            text-align: right;
        }

        .header-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-main);
            margin: 0;
            line-height: 1.2;
        }

        .header-subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            margin-top: 5px;
        }

        @media (max-width: 768px) {
            .top-bar {
                flex-direction: column;
                text-align: center;
                gap: 15px;
                padding: 15px 20px;
            }
            .header-actions { flex-direction: column-reverse; gap: 10px; }
            .header-content { text-align: center; }
            .brand-logo img { height: 55px; }
        }

        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .controls-container {
            background-color: var(--bg-card);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 30px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .search-sort-row { 
            display: flex; 
            gap: 15px; 
            margin-bottom: 20px; 
            align-items: stretch; 
        }

        .search-box {
            position: relative;
            flex-grow: 1;
        }

        .search-box input {
            width: 100%;
            padding: 15px;
            padding-inline-start: 50px;
            padding-inline-end: 20px;
            border-radius: 12px;
            border: 2px solid var(--border);
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Heebo', sans-serif;
            font-size: 1.05rem;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
            background-color: var(--bg-card);
        }

        .search-icon {
            position: absolute;
            inset-inline-start: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.2rem;
        }

        .filters {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background-color: var(--bg-main);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filter-btn:hover {
            background-color: #e2e8f0;
        }

        .filter-btn.active {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(0, 188, 212, 0.3);
        }

        @media (max-width: 768px) {
            .search-sort-row { flex-direction: column; }
            .filters { overflow-x: auto; padding-bottom: 10px; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; }
            .filter-btn { white-space: nowrap; }
        }

        .alliance-section {
            margin-bottom: 40px;
            animation: fadeIn 0.5s ease-out;
        }

        .alliance-title {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            border-bottom: 2px solid var(--border);
            padding-bottom: 10px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .airline-card {
            background-color: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
        }

        .airline-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            border-color: var(--primary);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .airline-logo-container {
            width: 65px;
            height: 65px;
            background-color: var(--bg-card);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
            overflow: hidden;
            padding: 5px;
            flex-shrink: 0;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        .airline-real-logo {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .airline-logo-fallback {
            width: 100%;
            height: 100%;
            background-color: var(--bg-main);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--text-main);
        }

        .airline-info h3 {
            font-size: 1.3rem;
            font-weight: 700;
            margin: 0 0 4px 0;
            color: var(--text-main);
        }

        .airline-info p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-badge {
            padding: 12px 16px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 1rem;
        }

        .theme-active { background-color: var(--status-active-bg); }
        .theme-active .status-text { color: var(--status-active-text); }
        .theme-active .status-icon { color: #10b981; }

        .theme-soon { background-color: var(--status-soon-bg); }
        .theme-soon .status-text { color: var(--status-soon-text); }
        .theme-soon .status-icon { color: #eab308; }

        .theme-suspended { background-color: var(--status-suspended-bg); }
        .theme-suspended .status-text { color: var(--status-suspended-text); }
        .theme-suspended .status-icon { color: #ef4444; }

        .theme-inactive { background-color: var(--status-inactive-bg); }
        .theme-inactive .status-text { color: var(--status-inactive-text); }
        .theme-inactive .status-icon { color: #64748b; }

        .status-pulse {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #10b981;
            box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .no-results { text-align: center; padding: 80px 20px; background-color: var(--bg-card); border-radius: 16px; border: 2px dashed var(--border); display: none; margin-top: 20px;}
        
        .skeleton { pointer-events: none; }
        .skeleton-box {
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); 
            background-size: 200% 100%; 
            animation: loading 1.5s infinite; 
            border-radius: 8px; 
        }
        .skeleton-logo { width: 60px; height: 60px; border-radius: 12px; }
        .skeleton-text-title { height: 24px; width: 60%; margin-bottom: 8px; }
        .skeleton-text-sub { height: 16px; width: 40%; }
        .skeleton-status { height: 45px; border-radius: 12px; margin-top: 10px; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    </style>
</head>

            { name: "יורווינגס", nameEn: "Eurowings", iata: "EW", status: "soon", until: "2026-07-01", region: "we_eu" },
            { name: "לופטהנזה", nameEn: "Lufthansa", iata: "LH", status: "soon", until: "2026-07-01", region: "we_eu" },
            { name: "סוויס", nameEn: "SWISS", iata: "LX", status: "soon", until: "2026-07-01", region: "we_eu" },
            { name: "סקנדינביאן איירליינס", nameEn: "SAS", iata: "SK", status: "suspended", until: "2026-10-31", region: "we_eu" },
            { name: "קלמ (KLM)", nameEn: "KLM", iata: "KL", status: "suspended", until: "2026-06-25", region: "we_eu" },

            // לא פעילות מ-7.10
            { name: "איזיג'ט", nameEn: "easyJet", iata: "U2", status: "inactive", region: "we_eu" },
            { name: "אייר סרביה", nameEn: "Air Serbia", iata: "JU", status: "inactive", region: "ee_ba" },
            { name: "אמירייטס", nameEn: "Emirates", iata: "EK", status: "inactive", region: "me_af" },
            { name: "אמריקן איירליינס", nameEn: "American Airlines", iata: "AA", status: "inactive", until: "2027-01-05", region: "na" },
            { name: "גאלף אייר", nameEn: "Gulf Air", iata: "GF", status: "inactive", region: "me_af" },
            { name: "וויולינג", nameEn: "Vueling", iata: "VY", status: "inactive", region: "we_eu" },
            { name: "טאפ אייר פורטוגל", nameEn: "TAP Air Portugal", iata: "TP", status: "inactive", until: "2026-08-18", region: "we_eu" },
            { name: "נורווג'יאן אייר", nameEn: "Norwegian Air", iata: "DY", status: "inactive", region: "we_eu" },
            { name: "פינאייר", nameEn: "Finnair", iata: "AY", status: "inactive", region: "we_eu" },
            { name: "קוריאן אייר", nameEn: "Korean Air", iata: "KE", status: "inactive", region: "as" },
            { name: "קונדור", nameEn: "Condor", iata: "DE", status: "inactive", until: "2026-08-01", region: "we_eu" },
            { name: "קתאי פסיפיק", nameEn: "Cathay Pacific", iata: "CX", status: "inactive", region: "as" },
            { name: "רויאל אייר מארוק", nameEn: "Royal Air Maroc", iata: "AT", status: "inactive", region: "me_af" },
            { name: "רויאל ג׳ורדניאן", nameEn: "Royal Jordanian", iata: "RJ", status: "inactive", region: "me_af" },
            { name: "ריינאייר", nameEn: "Ryanair", iata: "FR", status: "inactive", region: "we_eu" }
        ];

        function calculateDaysUntil(dateString) {
            if (!dateString) return null;
            const targetDate = new Date(dateString);
            targetDate.setHours(0, 0, 0, 0);
            
            // מקבעים את התאריך של המערכת כדי שהחישובים יעבדו נכון עם שנת 2026
            const today = new Date('2026-06-18T00:00:00');
            today.setHours(0, 0, 0, 0);
            
            const diffTime = targetDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            return diffDays;
        }

        function formatDateStr(dateString) {
            if (!dateString) return '';
            const parts = dateString.split('-');
            return `${parts[2]}/${parts[1]}/${parts[0]}`; 
        }

        function getStatusText(airline) {
            const strings = I18N[currentLang];
            
            if (airline.status === 'active') return strings.statusActive;
            if (airline.status === 'inactive' && !airline.until) return strings.statusSuspended;
            
            const diffDays = calculateDaysUntil(airline.until);
            const dateFormatted = formatDateStr(airline.until);

            if (diffDays === null) return strings.statusSuspended;
            if (diffDays < 0) return strings.statusPassed;
            if (diffDays === 0) return strings.statusToday;
            if (diffDays === 1) return strings.statusTomorrow;
            
            if (diffDays <= 14 || airline.status === 'soon') return `${strings.statusResumeIn}${dateFormatted}`;
            
            if (airline.status === 'inactive') return `${strings.statusExpectedIn}${dateFormatted}`;
            
            return `${strings.statusSuspendedUntil}${dateFormatted}`;
        }

        function createCardHTML(airline) {
            let themeClass = '';
            let iconClass = '';
            let pulseHtml = '';
            
            const diffDays = calculateDaysUntil(airline.until);

            let displayStatus = airline.status;
            if ((airline.status === 'suspended' || airline.status === 'inactive') && diffDays !== null && diffDays <= 14 && diffDays > 0) {
                displayStatus = 'soon';
            }

            switch(displayStatus) {
                case 'active': 
                    themeClass = 'theme-active'; 
                    iconClass = 'fa-circle-check'; 
                    pulseHtml = '<div class="status-pulse"></div>';
                    break;
                case 'soon': themeClass = 'theme-soon'; iconClass = 'fa-clock'; break;
                case 'suspended': themeClass = 'theme-suspended'; iconClass = 'fa-circle-pause'; break;
                case 'inactive': themeClass = 'theme-inactive'; iconClass = 'fa-circle-minus'; break;
            }

            const statusText = getStatusText(airline);
            const iataText = airline.iata !== "???" ? airline.iata : "--";
            const nameToDisplay = currentLang === 'en' ? airline.nameEn : airline.name;
            const strings = I18N[currentLang];

            // יצירת לוגו אמיתי במידה ויש IATA, אחרת גיבוי לטקסט
            let logoHtml = '';
            if (airline.customLogo) {
                logoHtml = `
                    <img src="${airline.customLogo}" class="airline-real-logo" alt="לוגו ${airline.name}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                    <div class="airline-logo-fallback" style="display: none;">${iataText}</div>
                `;
            } else if (airline.iata && airline.iata !== "???") {
                logoHtml = `
                    <img src="https://pics.avs.io/200/200/${airline.iata}.png" class="airline-real-logo" alt="לוגו ${airline.name}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                    <div class="airline-logo-fallback" style="display: none;">${iataText}</div>
                `;
            } else {
                logoHtml = `<div class="airline-logo-fallback">${iataText}</div>`;
            }

            return `
                <article class="airline-card">
                    <div class="card-header">
                        <div class="airline-logo-container">
                            ${logoHtml}
                        </div>
                        <div class="airline-info">
                            <h3>${nameToDisplay}</h3>
                            <p><i class="fa-solid fa-plane"></i> ${strings.airlineCode} ${iataText}</p>
                        </div>
                    </div>
                    <div class="status-badge ${themeClass}">
                        ${pulseHtml ? pulseHtml : `<i class="fa-solid ${iconClass} status-icon"></i>`}
                        <span class="status-text">${statusText}</span>
                    </div>
                </article>
            `;
        }

        function showLoading() {
            const container = document.getElementById('dashboardContainer');
            const noResults = document.getElementById('noResults');
            noResults.style.display = 'none';

            Array.from(container.children).forEach(child => {
                if(child.id !== 'noResults') child.remove();
            });

            const section = document.createElement('div');
            section.className = 'alliance-section';
            
            const skeletonCardsHtml = Array(6).fill(0).map(() => `
                <article class="airline-card skeleton">
                    <div class="card-header">
                        <div class="skeleton-box skeleton-logo"></div>
                        <div class="airline-info">
                            <div class="skeleton-box skeleton-text-title"></div>
                            <div class="skeleton-box skeleton-text-sub"></div>
                        </div>
                    </div>
                    <div class="skeleton-box skeleton-status"></div>
                </article>
            `).join('');

            section.innerHTML = `
                <div class="dashboard-grid">
                    ${skeletonCardsHtml}
                </div>
            `;
            container.insertBefore(section, noResults);
        }

        function sortAirlinesWithinGroup(a, b) {
            if (currentLang === 'en') {
                return a.nameEn.localeCompare(b.nameEn, 'en');
            }
            return a.name.localeCompare(b.name, 'he');
        }

        function renderAirlines(airlinesToRender) {
            const container = document.getElementById('dashboardContainer');
            const noResults = document.getElementById('noResults');
            
            Array.from(container.children).forEach(child => {
                if(child.id !== 'noResults') child.remove();
            });

            let hasVisibleAny = false;

            if (airlinesToRender.length > 0) {
                hasVisibleAny = true;

                REGION_GROUPS.forEach(group => {
                    const groupAirlines = airlinesToRender.filter(a => a.region === group.id);
                    
                    if (groupAirlines.length > 0) {
                        groupAirlines.sort(sortAirlinesWithinGroup);

                        const section = document.createElement('div');
                        section.className = 'alliance-section';
                        
                        const groupTitleToDisplay = currentLang === 'en' ? group.titleEn : group.title;
                        const cardsHtml = groupAirlines.map(a => createCardHTML(a)).join('');
                        
                        section.innerHTML = `
                            <h2 class="alliance-title">
                                ${groupTitleToDisplay}
                            </h2>
                            <div class="dashboard-grid">
                                ${cardsHtml}
                            </div>
                        `;
                        container.insertBefore(section, noResults);
                    }
                });
            }

            noResults.style.display = hasVisibleAny ? 'none' : 'block';
        }

        let currentFilter = 'all';
        let currentSearch = '';
        let loadingTimeout;

        function applyFilters() {
            clearTimeout(loadingTimeout);
            showLoading();

            loadingTimeout = setTimeout(() => {
                const filtered = AIRLINES.filter(airline => {
                    const searchLower = currentSearch.toLowerCase();
                    const matchesSearch = airline.name.includes(currentSearch) || 
                                          (airline.nameEn && airline.nameEn.toLowerCase().includes(searchLower)) ||
                                          airline.iata.toLowerCase().includes(searchLower);
                    const effectiveStatus = airline.status === 'inactive' ? 'suspended' : airline.status;
                    const matchesFilter = (currentFilter === 'all' || effectiveStatus === currentFilter);
                    return matchesSearch && matchesFilter;
                });

                renderAirlines(filtered);
            }, 300);
        }

        function setupFiltersAndSearch() {
            const searchInput = document.getElementById('searchInput');
            const filterBtns = document.querySelectorAll('.filter-btn');

            searchInput.addEventListener('input', (e) => {
                currentSearch = e.target.value;
                applyFilters();
            });

            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.getAttribute('data-filter');
                    applyFilters();
                });
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            setupFiltersAndSearch();
            applyFilters();
        });

    </script>
</body>

            font-size: 2.5rem; font-weight: 900; color: #fff; letter-spacing: -1px;
            font-family: Arial, sans-serif;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.45; }
        }
        @media (prefers-reduced-motion: reduce) {
            .airline-card, .theme-active .status-dot { animation: none !important; }
        }
    </style>

<body>
 
    <header class="app-header">
        <div class="logo-container">
            <img src="logo 24 png (18)_2.jpg" alt="אמסלם טורס - ניהול נסיעות גלובלי" class="header-logo" onerror="this.style.display='none'; document.getElementById('fallback-logo').style.display='inline-flex';">

            <span id="lastUpdated"></span>
        </div>
    </header>
 
    <div class="controls-container">
        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass search-icon" aria-hidden="true"></i>
            <input type="text" id="searchInput" autocomplete="off"
                   placeholder="חיפוש חברת תעופה או קוד IATA..."
                   aria-label="חיפוש חברת תעופה או קוד IATA">
            <button type="button" id="clearBtn" class="clear-btn" aria-label="נקה חיפוש">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        <div class="filter-buttons" role="group" aria-label="סינון לפי סטטוס">
            <button class="filter-btn active" data-filter="all" aria-pressed="true">הכל <span class="filter-count" data-count="all">0</span></button>
            <button class="filter-btn" data-filter="active" aria-pressed="false">פעילות עכשיו <span class="filter-count" data-count="active">0</span></button>
            <button class="filter-btn" data-filter="soon" aria-pressed="false">חוזרות בקרוב <span class="filter-count" data-count="soon">0</span></button>
            <button class="filter-btn" data-filter="suspended" aria-pressed="false">מושהות <span class="filter-count" data-count="suspended">0</span></button>

    <p class="results-summary" id="resultsSummary" aria-live="polite"></p>

    <script>
        // ── מקור אמת יחיד: כל עדכון נעשה כאן בלבד ──────────────────────────
        const LAST_UPDATED = '05/06/2026, שעה 08:00';
 
        // status: 'active' | 'soon' | 'suspended' | 'inactive'
        // until:  תאריך לסידור/ספירת ימים בפורמט 'YYYY-MM-DD' (או null)
        // note:   הטקסט שמוצג בכרטיס
        // israeli: חברה ישראלית (כוכב במקום מטוס)
        const AIRLINES = [
            // ── ישראליות (פעילות) ──
            { name: 'אל על', iata: 'LY', status: 'active', note: 'פעילה בנתב"ג', israeli: true },

            // ── זרות (פעילות) ──
            { name: "אג'יאן איירליינס", iata: 'A3', status: 'active', note: 'פעילה בנתב"ג' },

            { name: 'אוסטריאן איירליינס', iata: 'OS', status: 'active', note: 'פעילה בנתב"ג' },

            { name: 'אזרבייג׳ן איירליינס', iata: 'J2', status: 'active', note: 'פעילה בנתב"ג' },
            { name: 'איתיחאד', iata: 'EY', status: 'active', note: 'פעילה בנתב"ג' },
            { name: 'אתיופיאן איירליינס', iata: 'ET', status: 'active', note: 'פעילה בנתב"ג' },
            { name: 'בולגריה אייר', iata: 'FB', status: 'active', note: 'פעילה בנתב"ג' },
            { name: 'בלאביה', iata: 'B2', status: 'active', note: 'פעילה בנתב"ג' },
            { name: 'בלו בירד', iata: 'BZ', status: 'active', note: 'פעילה בנתב"ג' },
            { name: 'היי-סקיי (HISKY)', iata: 'H4', status: 'active', note: 'פעילה בנתב"ג' },
            { name: 'וויז אייר', iata: 'W6', status: 'active', note: 'פעילה בנתב"ג' },
            { name: 'טארום', iata: 'RO', status: 'active', note: 'פעילה בנתב"ג' },
            { name: 'טוס איירוויז', iata: 'U8', status: 'active', note: 'פעילה בנתב"ג' },
            { name: 'לוט (LOT)', iata: 'LO', status: 'active', note: 'פעילה בנתב"ג' },
            { name: 'סייפרוס איירוייז', iata: 'CY', status: 'active', note: 'פעילה בנתב"ג' },
            { name: 'סמארטווינגס', iata: 'QS', status: 'active', note: 'פעילה בנתב"ג' },
            { name: 'סקיי אפ', iata: 'PQ', status: 'active', note: 'פעילה בנתב"ג' },
            { name: 'סקיי אקספרס', iata: 'GQ', status: 'active', note: 'פעילה בנתב"ג' },
            { name: 'פליי דובאי', iata: 'FZ', status: 'active', note: 'פעילה בנתב"ג' },
            { name: 'פליי וואן', iata: '5F', status: 'active', note: 'פעילה בנתב"ג' },
            { name: 'צנטרום אייר', iata: 'C6', status: 'active', note: 'פעילה בנתב"ג' },
            { name: 'רד ווינגס', iata: 'WZ', status: 'active', note: 'פעילה בנתב"ג' },
 
            // ── חוזרות בקרוב ──
            { name: 'נאוס', iata: 'NO', status: 'soon', until: '2026-06-10', note: 'תחדש ב-10/06' },
            { name: 'איטה (ITA)', iata: 'AZ', status: 'soon', until: '2026-07-01', note: 'תחדש ב-01/07' },
            { name: 'יורווינגס', iata: 'EW', status: 'soon', until: '2026-07-01', note: 'תחדש ב-01/07' },
            { name: 'לופטהנזה', iata: 'LH', status: 'soon', until: '2026-07-01', note: 'תחדש ב-01/07' },
            { name: 'סוויס', iata: 'LX', status: 'soon', until: '2026-07-01', note: 'תחדש ב-01/07' },
            { name: 'טאפ אייר פורטוגל', iata: 'TP', status: 'soon', until: '2026-08-01', note: 'צפויה לחדש ב-01/08' },
            { name: 'קונדור', iata: 'DE', status: 'soon', until: '2026-08-01', note: 'צפויה להפעיל ב-01/08' },
            { name: 'בראסלס איירליינס', iata: 'SN', status: 'soon', until: '2026-10-24', note: 'תחדש ב-24/10' },
            { name: 'אמריקן איירליינס', iata: 'AA', status: 'soon', until: '2027-01-05', note: 'צפויה לחדש ב-05/01/2027' },
 
            // ── מושהות (עם תאריך חזרה) ──
            { name: 'אייר פראנס', iata: 'AF', status: 'suspended', until: '2026-06-14', note: 'מושהית עד 14/06' },
            { name: 'קלמ (KLM)', iata: 'KL', status: 'suspended', until: '2026-06-17', note: 'מושהית עד 17/06' },
            { name: 'אייר אירופה', iata: 'UX', status: 'suspended', until: '2026-06-28', note: 'מושהית עד 28/06' },
            { name: 'ג׳אורג׳יאן איירווייז', iata: 'A9', status: 'suspended', until: '2026-07-01', note: 'מושהית עד 01/07' },
            { name: 'אייר בלטיק', iata: 'BT', status: 'suspended', until: '2026-07-01', note: 'מושהית עד 01/07' },
            { name: 'טראנסאוויה צרפת', iata: 'TO', status: 'suspended', until: '2026-07-05', note: 'מושהית עד 05/07' },
            { name: 'אייר אינדיה', iata: 'AI', status: 'suspended', until: '2026-07-31', note: 'מושהית עד 31/07' },
            { name: 'אנימה ווינגס', iata: 'A2', status: 'suspended', until: '2026-08-10', note: 'מושהית עד 10/08' },
            { name: 'דלתא איירליינס', iata: 'DL', status: 'suspended', until: '2026-09-05', note: 'מושהית עד 05/09' },
            { name: 'אייר קנדה', iata: 'AC', status: 'suspended', until: '2026-09-07', note: 'מושהית עד 07/09' },
            { name: 'יונייטד', iata: 'UA', status: 'suspended', until: '2026-09-07', note: 'מושהית עד 07/09' },
            { name: 'איבריה', iata: 'IB', status: 'suspended', until: '2026-10-24', note: 'מושהית עד 24/10' },
            { name: 'בריטיש איירווייז', iata: 'BA', status: 'suspended', until: '2026-10-24', note: 'מושהית עד 24/10' },
            { name: 'סקנדינביאן (SAS)', iata: 'SK', status: 'suspended', until: '2026-10-31', note: 'מושהית עד 31/10' },
 
            // ── מושהות ללא תאריך חזרה ──
            { name: 'אייר סיישל', iata: 'HM', status: 'inactive', note: 'השהתה פעילות' },
            { name: 'היינאן איירליינס', iata: 'HU', status: 'inactive', note: 'השהתה פעילות' },
            { name: "איזיג'ט", iata: 'U2', status: 'inactive', note: 'השהתה טיסות' },
            { name: 'אייר סרביה', iata: 'JU', status: 'inactive', note: 'השהתה טיסות' },
            { name: 'אמירייטס', iata: 'EK', status: 'inactive', note: 'השהתה טיסות' },
            { name: 'גאלף אייר', iata: 'GF', status: 'inactive', note: 'השהתה טיסות' },
            { name: 'וויולינג', iata: 'VY', status: 'inactive', note: 'השהתה טיסות' },
            { name: "נורווג'יאן אייר", iata: 'DY', status: 'inactive', note: 'השהתה טיסות' },
            { name: 'פינאייר', iata: 'AY', status: 'inactive', note: 'השהתה טיסות' },
            { name: 'קוריאן אייר', iata: 'KE', status: 'inactive', note: 'השהתה טיסות' },
            { name: 'קתאי פסיפיק', iata: 'CX', status: 'inactive', note: 'השהתה טיסות' },
            { name: 'רויאל אייר מארוק', iata: 'AT', status: 'inactive', note: 'השהתה טיסות' },
            { name: 'רויאל ג׳ורדניאן', iata: 'RJ', status: 'inactive', note: 'השהתה טיסות' },
            { name: 'ריינאייר', iata: 'FR', status: 'inactive', note: 'השהתה טיסות' },
        ];
 
        // ── הגדרות ──────────────────────────────────────────────────────
        const STATUS_ORDER = { active: 0, soon: 1, suspended: 2, inactive: 3 };
        const ICONS = { active: 'fa-star', israeli: 'fa-star', foreign: 'fa-plane', inactive: 'fa-plane-slash' };
        const collator = new Intl.Collator('he');
 
        function daysUntil(isoDate) {
            if (!isoDate) return null;
            const today = new Date(); today.setHours(0, 0, 0, 0);
            const target = new Date(isoDate + 'T00:00:00');
            return Math.round((target - today) / 86400000);
        }
 
        function relativeLabel(item) {
            if (!item.until) return '';
            const d = daysUntil(item.until);
            if (d === null) return '';
            if (d < 0) return 'התאריך חלף';
            if (d === 0) return 'היום';
            if (d === 1) return 'מחר';
            return `עוד ${d} ימים`;
        }
 
        // סדר תצוגה: לפי סטטוס, ובתוכו ישראליות→זרות / לפי תאריך / א״ב
        function compare(a, b) {
            if (STATUS_ORDER[a.status] !== STATUS_ORDER[b.status])
                return STATUS_ORDER[a.status] - STATUS_ORDER[b.status];
            if (a.status === 'active') {
                if (!!b.israeli !== !!a.israeli) return a.israeli ? -1 : 1;
                return collator.compare(a.name, b.name);
            }
            if (a.until && b.until && a.until !== b.until) return a.until < b.until ? -1 : 1;
            return collator.compare(a.name, b.name);
        }
 
        function iconFor(item) {
            if (item.status === 'inactive') return ICONS.inactive;
            if (item.israeli) return ICONS.israeli;
            if (item.status === 'active') return ICONS.foreign;
            return ICONS.foreign;
        }
 
        // מקורות לוגו לפי קוד IATA (שירותי לוגו מקובלים בתעופה), עם נפילה לאייקון
        function logoSources(iata) {
            const code = encodeURIComponent(iata);
            return [
                `https://pics.avs.io/120/120/${code}@2x.png`,
                `https://images.kiwi.com/airlines/128/${code}.png`
            ];
        }
 
        function createCard(item) {
            const card = document.createElement('article');
            card.className = `airline-card theme-${item.status}${item.israeli ? ' is-israeli' : ''}`;
            card.dataset.status = item.status;
            card.dataset.group = item.status === 'inactive' ? 'suspended' : item.status;
            card.dataset.search = (item.name + ' ' + item.iata).toLowerCase();
 
            const rel = relativeLabel(item);
            card.innerHTML = `
                <div class="card-header">
                    <div class="logo-chip">
                        <img alt="לוגו ${item.name}" loading="lazy">
                        <i class="fa-solid ${iconFor(item)} logo-fallback" aria-hidden="true"></i>
                    </div>
                    <div class="airline-info">
                        <h2 class="airline-name">${item.name}</h2>
                        <span class="iata-pill">${item.iata}</span>
                    </div>
                    <i class="fa-solid ${iconFor(item)} airline-type-icon" aria-hidden="true"></i>
                </div>
                <div class="status-container">
                    <div class="status-dot" aria-hidden="true"></div>
                    <div class="status-text">${item.note}${rel ? `<span class="status-meta">${rel}</span>` : ''}</div>
                </div>`;
 
            // טעינת לוגו עם מעבר בין מקורות, ונפילה לאייקון אם אין לוגו
            const chip = card.querySelector('.logo-chip');
            const img = chip.querySelector('img');
            const sources = logoSources(item.iata);
            let si = 0;
            img.addEventListener('error', () => {
                si++;
                if (si < sources.length) img.src = sources[si];
                else chip.classList.add('empty');
            });
            img.src = sources[0];
 
            return card;
        }
 
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('dashboardGrid');
            const noResults = document.getElementById('noResults');
            const searchInput = document.getElementById('searchInput');
            const clearBtn = document.getElementById('clearBtn');
            const filterBtns = document.querySelectorAll('.filter-btn');
            const summary = document.getElementById('resultsSummary');
 
            document.getElementById('lastUpdated').textContent = 'מעודכן ל-' + LAST_UPDATED;
 
            // עדכון מוני הסינון
            const counts = { all: AIRLINES.length, active: 0, soon: 0, suspended: 0 };
            AIRLINES.forEach(a => {
                const g = a.status === 'inactive' ? 'suspended' : a.status;
                counts[g] = (counts[g] || 0) + 1;
            });
            document.querySelectorAll('.filter-count').forEach(el => {
                el.textContent = counts[el.dataset.count] ?? 0;
            });
 
            // בניית הכרטיסים פעם אחת, ממוינים
            const sorted = [...AIRLINES].sort(compare);
            const cards = sorted.map(createCard);
            const frag = document.createDocumentFragment();
            cards.forEach((c, i) => { c.style.animationDelay = `${Math.min(i * 18, 400)}ms`; frag.appendChild(c); });
            grid.insertBefore(frag, noResults);
 
            let currentFilter = 'all';
            let currentSearch = '';
 
            const apply = () => {
                let visible = 0;
                cards.forEach(card => {
                    const matchFilter = currentFilter === 'all' || card.dataset.group === currentFilter;
                    const matchSearch = !currentSearch || card.dataset.search.includes(currentSearch);
                    const show = matchFilter && matchSearch;
                    card.style.display = show ? 'flex' : 'none';
                    if (show) visible++;
                });
                noResults.style.display = visible === 0 ? 'block' : 'none';
                summary.textContent = visible === 0 ? '' : `מציג ${visible} מתוך ${AIRLINES.length} חברות`;
            };
 
            searchInput.addEventListener('input', e => {
                currentSearch = e.target.value.toLowerCase().trim();
                clearBtn.classList.toggle('visible', currentSearch.length > 0);
                apply();
            });
 
            searchInput.addEventListener('keydown', e => {
                if (e.key === 'Escape') { searchInput.value = ''; currentSearch = ''; clearBtn.classList.remove('visible'); apply(); }
            });
 
            clearBtn.addEventListener('click', () => {
                searchInput.value = ''; currentSearch = '';
                clearBtn.classList.remove('visible');
                searchInput.focus();
                apply();
            });
 
            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    filterBtns.forEach(b => { b.classList.remove('active'); b.setAttribute('aria-pressed', 'false'); });
                    btn.classList.add('active');
                    btn.setAttribute('aria-pressed', 'true');
                    currentFilter = btn.dataset.filter;
                    apply();
                });
            });
 
            apply();
        });
    </script>
</body>
